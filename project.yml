name: Anthology
options:
  bundleIdPrefix: com.lomusciolabs
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: false
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

# Per-target xcconfig that pulls DEVELOPMENT_TEAM (and any other personal
# overrides) from a gitignored `local.xcconfig`. See local.xcconfig.example.
configFiles:
  Debug: local.xcconfig
  Release: local.xcconfig

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.2.0

targets:
  Anthology:
    type: application
    platform: iOS
    sources:
      - path: Anthology
    resources:
      - path: Anthology/Resources
        optional: true
    info:
      path: Anthology/Info.plist
      properties:
        CFBundleDisplayName: Anthology
        CFBundleShortVersionString: "0.7.3"
        CFBundleVersion: "12"
        # Standard URLSession TLS is exempt from export compliance review;
        # this skips ASC's compliance question on every upload.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIStatusBarStyle: UIStatusBarStyleDefault
        NSCameraUsageDescription: Used to scan the pairing QR code shown by Anthology on your Mac.
        NSLocalNetworkUsageDescription: Used to reach Anthology on your Mac over your local network or Tailscale.
        NSAppTransportSecurity:
          # Anthology's bridge serves plaintext WebSocket on a private network
          # (Tailscale tailnet or LAN). The bearer token + WireGuard make TLS
          # redundant for the v1 transport. We allow HTTP only on private IPs.
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lomusciolabs.anthology-ios
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          # Xcode-direct dev builds → APNs sandbox (matches PushManager #if DEBUG).
          CODE_SIGN_ENTITLEMENTS: Anthology/Anthology.Debug.entitlements
        Release:
          # TestFlight / App Store builds → APNs production.
          CODE_SIGN_ENTITLEMENTS: Anthology/Anthology.Release.entitlements
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
